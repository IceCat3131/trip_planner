<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trip Planner v4</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand">Trip Planner v4</div>
      <div class="sub">多计划 · 导游讲解稿 · 定位提醒</div>
    </div>
    <button id="btnLogout" class="ghost hidden">退出</button>
  </header>

  <main>
    <section id="authPanel" class="card">
      <h2>登录 / 注册</h2>
      <label>用户名</label>
      <input id="authUsername" placeholder="例如 leo" autocomplete="username" />
      <label>密码</label>
      <input id="authPassword" type="password" placeholder="至少 6 位" autocomplete="current-password" />
      <div class="row">
        <button id="btnLogin">登录</button>
        <button id="btnRegister" class="secondary">注册</button>
      </div>
      <p class="hint">账号用于保存多个旅行计划，换设备登录后也能看到。</p>
    </section>

    <section id="appPanel" class="hidden">
      <section class="card">
        <div class="sectionHead">
          <h2>我的计划</h2>
          <button id="btnNewPlan" class="secondary">+ 新计划</button>
        </div>
        <div id="plansList" class="plans"></div>
      </section>

      <section id="editor" class="card hidden">
        <h2>计划编辑</h2>
        <label>计划名称</label>
        <input id="planName" placeholder="例如：17 Mile + Carmel 一日游" />
        <label>出发时间</label>
        <input id="startTime" type="time" value="08:00" />
        <div class="row">
          <button id="btnSavePlan">保存计划</button>
          <button id="btnDeletePlan" class="danger">删除</button>
        </div>
      </section>

      <section id="pointAdder" class="card hidden">
        <h2>添加地点 / 景点</h2>
        <label>搜索地点</label>
        <div class="searchRow">
          <input id="searchText" placeholder="输入景点、地址、酒店、餐厅" />
          <button id="btnSearch" class="secondary">搜索</button>
        </div>
        <div id="searchStatus" class="hint"></div>
        <div id="searchResults" class="results"></div>

        <label>停留时间（分钟）</label>
        <input id="stayMinutes" type="number" min="0" value="45" />
        <label>讲解稿</label>
        <textarea id="guideText" rows="5" placeholder="到达这个景点附近时显示给导游看的讲解内容"></textarea>
        <button id="btnAddSelected" disabled>添加到计划</button>
      </section>

      <section id="pointsPanel" class="card hidden">
        <div class="sectionHead">
          <h2>地点列表</h2>
          <button id="btnBuildRoute" class="secondary">生成时间表</button>
        </div>
        <div id="pointsList"></div>
      </section>

      <section id="mapPanel" class="card hidden">
        <div class="sectionHead">
          <h2>地图 / 导航辅助</h2>
          <button id="btnLocate" class="secondary">📍 我的位置</button>
        </div>
        <div id="map"></div>
        <div class="row">
          <button id="btnGoogleNav">打开 Google 导航</button>
          <button id="btnWatch" class="secondary">开始定位提醒</button>
        </div>
        <div id="navInfo" class="hint">生成路线后显示进度。</div>
      </section>

      <section id="timelinePanel" class="card hidden">
        <h2>行程时间表</h2>
        <div class="progressWrap"><div id="progressBar"></div></div>
        <div id="timeline"></div>
      </section>

      <section id="guidePanel" class="card hidden guideCard">
        <h2 id="guideTitle">讲解稿</h2>
        <div id="guideBody"></div>
        <button id="btnCloseGuide" class="secondary">关闭</button>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
